server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https:; font-src 'self'; object-src 'none'; frame-src 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API requests go through the NBG compliance proxy (introspection + audit),
    # which forwards to the Core. ${API_UPSTREAM} is substituted at start.
    #   Local compose: http://server:3001 (no proxy locally)
    #   Azure:         https://nbg-webapp-rdarr-proxy-...azurewebsites.net
    location /api/ {
        # Azure platform DNS (168.63.129.16) first, Docker embedded DNS for local
        # compose (127.0.0.11), public fallback (8.8.8.8).
        resolver 168.63.129.16 127.0.0.11 8.8.8.8 valid=30s ipv6=off;
        set $api_upstream "${API_UPSTREAM}";
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50m;
    }

    # OIDC login endpoints go straight to the Core (pre-auth login step — must
    # NOT pass through the validating compliance proxy). ${BACKEND_URL} = Core.
    location /auth/ {
        resolver 168.63.129.16 127.0.0.11 8.8.8.8 valid=30s ipv6=off;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 1m;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
